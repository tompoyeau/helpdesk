<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Planning – Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body class="h-screen flex flex-col">

  <!-- HEADER -->
  <header class="app-header flex items-center justify-between px-5 py-0" style="height:52px">
    <div class="flex items-center gap-3">
      <div class="app-logo">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="1" y="1" width="6" height="6" rx="1.5" fill="white" fill-opacity="0.9"/>
          <rect x="11" y="1" width="6" height="6" rx="1.5" fill="white" fill-opacity="0.55"/>
          <rect x="1" y="11" width="6" height="6" rx="1.5" fill="white" fill-opacity="0.55"/>
          <rect x="11" y="11" width="6" height="6" rx="1.5" fill="white" fill-opacity="0.9"/>
        </svg>
      </div>
      <div>
        <h1 class="text-sm font-semibold tracking-tight leading-tight">Planning Dashboard</h1>
        <p class="text-xs leading-tight" style="color:var(--text-muted)">Pilotage de l'activité</p>
      </div>
    </div>

    <div class="flex items-center gap-2">
      <div class="date-range-group">
        <span class="date-label">Du</span>
        <input type="date" id="filterStart" class="date-input">
        <span class="date-label">au</span>
        <input type="date" id="filterEnd" class="date-input">
      </div>

      <button id="refresh" class="btn-primary">
        <i data-lucide="refresh-cw" style="width:12px;height:12px;"></i>
        Appliquer
      </button>

      <div style="width:1px;height:20px;background:var(--border);margin:0 4px;"></div>

      <button id="toggleDark" class="btn-icon" title="Basculer le mode sombre">
        <i id="darkIcon" data-lucide="moon" style="width:15px;height:15px;"></i>
      </button>
    </div>
  </header>


  <!-- LAYOUT 3 COLONNES -->
  <div class="flex-1 grid overflow-hidden" style="grid-template-columns:240px 1fr 220px">

    <!-- COLLABORATEURS -->
    <aside class="app-sidebar flex flex-col min-h-0" style="border-right:1px solid var(--border)">

      <div class="p-3" style="border-bottom:1px solid var(--border); space-y:10px">
        <button id="viewGlobal" class="btn-dashboard w-full mb-2.5">
          <i data-lucide="layout-dashboard" style="width:13px;height:13px;"></i>
          Tableau de bord
        </button>

        <label class="toggle-label flex items-center gap-2 cursor-pointer">
          <input type="checkbox" id="filterActive" checked class="toggle-input">
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
          <span class="toggle-text">Collaborateurs actifs seulement</span>
        </label>
      </div>

      <div class="px-3 py-2" style="border-bottom:1px solid var(--border)">
        <div class="search-wrapper">
          <i data-lucide="search" class="search-icon" style="width:12px;height:12px;"></i>
          <input id="personSearch" placeholder="Rechercher un collaborateur…" class="search-input">
        </div>
      </div>

      <div class="px-3 pt-3 pb-1">
        <span class="sidebar-section-label">Collaborateurs</span>
      </div>

      <div class="scroll-area flex-1">
        <ul id="personList" class="px-2 pb-2"></ul>
      </div>

    </aside>

    <!-- CONTENU CENTRAL -->
    <main class="flex flex-col overflow-hidden min-h-0" style="background:var(--bg-surface)">

      <!-- CHARTS -->
      <section>
        <div id="chartsBlock" class="grid charts-container" style="grid-template-columns:1fr 1fr">
        </div>
      </section>

      <!-- DETAILS -->
      <section class="flex-1 overflow-auto" style="padding:12px 12px 12px">
        <div id="center" class="content-card text-xs">Chargement…</div>
      </section>

    </main>

    <!-- CATÉGORIES -->
    <aside class="app-sidebar flex flex-col min-h-0" style="border-left:1px solid var(--border)">
      <div class="px-3 pt-3 pb-1">
        <span class="sidebar-section-label">Catégories</span>
      </div>
      <div class="scroll-area flex-1">
        <ul id="categoryList" class="px-2 pb-2"></ul>
      </div>
    </aside>

  </div>

  <!-- OVERLAY DE LOGIN -->
  <div id="loginOverlay">
    <div class="login-card">
      <div class="login-logo">
        <svg width="22" height="22" viewBox="0 0 18 18" fill="none">
          <rect x="1" y="1" width="6" height="6" rx="1.5" fill="white" fill-opacity="0.9"/>
          <rect x="11" y="1" width="6" height="6" rx="1.5" fill="white" fill-opacity="0.55"/>
          <rect x="1" y="11" width="6" height="6" rx="1.5" fill="white" fill-opacity="0.55"/>
          <rect x="11" y="11" width="6" height="6" rx="1.5" fill="white" fill-opacity="0.9"/>
        </svg>
      </div>
      <h2 class="login-title">Planning Dashboard</h2>
      <p class="login-subtitle">Accès restreint — entrez le mot de passe pour continuer</p>

      <form id="loginForm">
        <div class="login-field">
          <i data-lucide="lock" class="login-field-icon" style="width:14px;height:14px"></i>
          <input
            id="loginPassword"
            type="password"
            placeholder="Mot de passe"
            class="login-input"
            autocomplete="current-password"
          >
        </div>

        <p id="loginError" class="login-error" style="display:none">
          <i data-lucide="alert-circle" style="width:13px;height:13px;flex-shrink:0"></i>
          Mot de passe incorrect
        </p>

        <button id="loginBtn" type="submit" class="login-btn">
          Accéder
        </button>
      </form>
    </div>
  </div>

  <!-- JS -->
  <script src="js/data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/charts.js"></script>

</body>
</html>
