<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dashboard Planning</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
</head>

<body class="h-screen flex flex-col bg-slate-50 text-slate-900">

<header class="flex items-center gap-4 px-6 py-3 bg-white border-b border-slate-200">
  <div class="flex items-center gap-2">
    <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white font-bold">PL</div>
    <div><h1 class="text-lg font-semibold">Planning – Dashboard</h1><p class="text-xs text-slate-500">Pilotage activité</p></div>
  </div>

  <div class="flex-1"></div>

  <div class="flex items-center gap-3 text-xs">
    <select id="mode" class="rounded bg-slate-100 border px-2 py-1">
      <option value="jours">Jours</option><option value="slots">Créneaux</option>
    </select>
    <select id="limit" class="rounded bg-slate-100 border px-2 py-1">
      <option>5</option><option selected>10</option><option>20</option>
    </select>
    <input type="date" id="filterStart" class="rounded bg-slate-100 border px-2 py-1">
    <input type="date" id="filterEnd" class="rounded bg-slate-100 border px-2 py-1">
    <select id="filterCategory" class="rounded bg-slate-100 border px-2 py-1"><option value="">Toutes</option></select>
    <button id="refresh" class="bg-blue-600 text-white px-3 py-1 rounded">OK</button>
    <label class="cursor-pointer"><span class="px-3 py-1 bg-slate-800 text-white rounded">Importer</span><input type="file" id="fileInput" class="hidden"></label>
    <button id="clear" class="bg-red-500 text-white px-3 py-1 rounded">X</button>
  </div>
</header>

<div class="flex-1 flex overflow-hidden">

  <aside class="w-64 border-r bg-white flex flex-col">
    <div class="p-4 border-b">
      <button id="viewGlobal" class="w-full text-left px-2 py-1 rounded bg-blue-600 text-white">Vue globale</button>
    </div>

    <div class="p-4 border-b">
      <input id="personSearch" placeholder="Rechercher..." class="w-full mb-2 px-2 py-1 text-xs border rounded bg-slate-50">
      <ul id="personList" class="space-y-1 text-xs max-h-64 overflow-auto"></ul>
    </div>

    <div class="p-4 flex-1 overflow-auto">
      <ul id="categoryList" class="space-y-1 text-xs"></ul>
    </div>
  </aside>

  <main class="flex-1 flex flex-col overflow-hidden">

    <!-- KPIs -->
    <section class="p-4 grid grid-cols-1 md:grid-cols-4 gap-4 border-b bg-white">
      <div class="p-3 bg-slate-50 border rounded"><p class="text-xs text-slate-500">Période</p><p id="kpiPeriod" class="font-semibold">–</p></div>
      <div class="p-3 bg-slate-50 border rounded"><p class="text-xs text-slate-500">Jours</p><p id="kpiDays" class="text-xl font-semibold">–</p></div>
      <div class="p-3 bg-slate-50 border rounded"><p class="text-xs text-slate-500">Créneaux</p><p id="kpiSlots" class="text-xl font-semibold">–</p></div>
      <div class="p-3 bg-slate-50 border rounded"><p class="text-xs text-slate-500">Top Cat.</p><p id="kpiTopCategory" class="font-semibold">–</p></div>
    </section>

    <!-- PODIUM -->
    <section class="p-4 border-b bg-white">
      <h3 class="text-sm font-semibold mb-2">🏆 Podium Top 5 (catégorie sélectionnée)</h3>
      <div id="podium" class="grid grid-cols-5 gap-2 text-xs"></div>
    </section>

    <!-- CHARTS + DETAILS -->
    <section class="flex-1 grid grid-rows-[260px,1fr] gap-4 p-4 overflow-hidden">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="p-3 bg-white border rounded"><div id="chartCategories" class="w-full h-full"></div></div>
        <div class="p-3 bg-white border rounded"><div id="chartMonths" class="w-full h-full"></div></div>
      </div>
      <div id="center" class="p-4 bg-white border rounded overflow-auto text-xs">Chargement…</div>
    </section>

  </main>
</div>

<script>
let planning, persons=[], categories=[], colors={}, filtered=null;
const $=id=>document.getElementById(id);
const els={mode:$("#mode"),limit:$("#limit"),fs:$("#filterStart"),fe:$("#filterEnd"),fc:$("#filterCategory"),
  refresh:$("#refresh"),file:$("#fileInput"),clear:$("#clear"),pg:$("#viewGlobal"),
  plist:$("#personList"),clist:$("#categoryList"),psearch:$("#personSearch"),center:$("#center"),
  kpiP:$("#kpiPeriod"),kpiD:$("#kpiDays"),kpiS:$("#kpiSlots"),kpiT:$("#kpiTopCategory"),podium:$("#podium")};

const fmt=d=>{let[m,y]=[d.split("-")[1],d.split("-")[0]];return d.split("-")[2]+" "+["janv","févr","mars","avr","mai","juin","juil","août","sept","oct","nov","déc"][m-1]+" "+y};

function setDefaultRange(){let t=new Date(),p=new Date();p.setFullYear(t.getFullYear()-1);
  els.fs.value=p.toISOString().slice(0,10); els.fe.value=t.toISOString().slice(0,10);}

async function autoLoad(){
  setDefaultRange();
  try{let r=await fetch("planning_enrichi.json",{cache:"no-store"});
    if(r.ok){planning=await r.json();init();compute();renderGlobal();updateCharts();return;}
  }catch{}
  els.center.innerHTML=`<div class="p-4 bg-yellow-50 border text-yellow-900">Aucun fichier planning détecté</div>`;
}

function init(){
  persons=Object.keys(planning).sort();
  let set=new Set(), col={};
  for(let p in planning)for(let d in planning[p])planning[p][d].forEach(e=>{
    set.add(e.categorie); if(!col[e.categorie])col[e.categorie]=e.couleur;
  });
  categories=[...set].sort(); colors=col;
  els.fc.innerHTML=`<option value="">Toutes</option>`+categories.map(c=>`<option>${c}</option>`).join("");
  renderLists();
}

function renderLists(){
  els.plist.innerHTML=persons.filter(n=>n.toLowerCase().includes(els.psearch.value.toLowerCase()))
    .map(n=>`<li class="px-2 py-1 rounded cursor-pointer hover:bg-slate-100" onclick="selPerson('${n}')">${n}</li>`).join("");
  els.clist.innerHTML=categories.map(c=>`<li class="px-2 py-1 rounded cursor-pointer hover:bg-slate-100 flex justify-between" onclick="selCat('${c}')">
    <span>${c}</span><span class="w-3 h-3 rounded-sm" style="background:${colors[c]}"></span></li>`).join("");
}

function selPerson(n){currentPerson=n;currentCategory=null;compute();renderPerson(n);updateCharts();highlight();}
function selCat(c){currentCategory=c;currentPerson=null;compute();renderCat(c);updateCharts();highlight();}
function highlight(){
  [...els.plist.children].forEach(li=>li.classList.toggle("bg-blue-600",li.textContent===currentPerson));
  [...els.clist.children].forEach(li=>li.classList.toggle("bg-blue-600",li.firstChild.textContent===currentCategory));
  els.pg.classList.toggle("bg-blue-600",!currentPerson&&!currentCategory);
}

function compute(){
  let fs=els.fs.value,fe=els.fe.value,fc=els.fc.value;
  let byCat={},byMonth={},byPerson={},byDay=new Set(),slots=0;
  for(let p in planning)for(let d in planning[p]){
    if(fs&&d<fs)continue;if(fe&&d>fe)continue;
    planning[p][d].forEach(e=>{
      if(fc&&e.categorie!==fc)return;
      byCat[e.categorie]=(byCat[e.categorie]||0)+1;
      let m=d.slice(0,7);byMonth[m]=(byMonth[m]||0)+1;
      byPerson[p]=byPerson[p]||{slots:0,days:new Set(),details:{}};
      byPerson[p].slots++;byPerson[p].days.add(d);
      (byPerson[p].details[d]=byPerson[p].details[d]||[]).push(e);
      byDay.add(d);slots++;
    });
  }
  filtered={byCat,byMonth,byPerson,byDay,totalSlots:slots};
  updatePodium();
}

function updatePodium(){
  if(!currentCategory){els.podium.innerHTML=`<div class="text-slate-400 col-span-5">Sélectionne une catégorie</div>`;return;}
  let arr=[];
  for(let p in filtered.byPerson){
    let s=0;for(let d in filtered.byPerson[p].details)
      filtered.byPerson[p].details[d].forEach(e=>{if(e.categorie===currentCategory)s++;});
    if(s>0)arr.push([p,s]);
  }
  arr.sort((a,b)=>b[1]-a[1]);arr=arr.slice(0,5);
  els.podium.innerHTML=arr.map(([p,s],i)=>`<div class="p-2 bg-slate-100 border rounded text-center">
    <div class="font-bold">${i+1}</div><div>${p}</div><div class="text-xs">${s} créneaux</div></div>`).join("");
}

function renderGlobal(){
  let m=els.mode.value;
  let rows=Object.entries(filtered.byCat).map(([c,s])=>[c,s,countDays(c)]).sort((a,b)=>b[1]-a[1]);
  els.center.innerHTML=`<h2 class="font-semibold mb-2">Vue globale</h2>
  <table class="w-full text-xs border rounded"><thead class="bg-slate-100"><tr>
  <th>Cat.</th><th>Couleur</th><th class="text-right">${m==="jours"?"Jours":"Créneaux"}</th></tr></thead><tbody>
  ${rows.map(r=>`<tr><td>${r[0]}</td><td><span class="w-3 h-3 inline-block rounded-sm" style="background:${colors[r[0]]}"></span></td>
  <td class="text-right">${m==="jours"?r[2]:r[1]}</td></tr>`).join("")}</tbody></table>`;
}

function countDays(cat){
  let c=0;for(let p in filtered.byPerson)for(let d in filtered.byPerson[p].details)
    if(filtered.byPerson[p].details[d].some(e=>e.categorie===cat))c++;
  return c;
}

function renderPerson(n){
  let m=els.mode.value,d=filtered.byPerson[n];if(!d){els.center.innerHTML="Aucune donnée";return;}
  let byCat={};for(let day in d.details)d.details[day].forEach(e=>{
    byCat[e.categorie]=byCat[e.categorie]||{s:0,d:new Set()};byCat[e.categorie].s++;byCat[e.categorie].d.add(day);
  });
  let rows=Object.entries(byCat).map(([c,v])=>[c,v.s,v.d.size]).sort((a,b)=>b[1]-a[1]);
  let days=Object.keys(d.details).sort().reverse();
  els.center.innerHTML=`<h2 class="font-semibold mb-2">${n}</h2>
  <table class="w-full text-xs border rounded mb-4"><thead class="bg-slate-100"><tr>
  <th>Cat.</th><th>Couleur</th><th class="text-right">${m==="jours"?"Jours":"Créneaux"}</th></tr></thead><tbody>
  ${rows.map(r=>`<tr><td>${r[0]}</td><td><span class="w-3 h-3 inline-block rounded-sm" style="background:${colors[r[0]]}"></span></td>
  <td class="text-right">${m==="jours"?r[2]:r[1]}</td></tr>`).join("")}</tbody></table>

  <h3 class="font-semibold mb-2">Détails</h3>
  <table class="w-full text-xs border rounded"><thead class="bg-slate-100"><tr>
  <th>Date</th><th>Cat.</th><th>Horaires</th></tr></thead><tbody>
  ${days.map(day=>{
    let e=d.details[day],h=e.map(x=>x.horaire).join(", "),c=[...new Set(e.map(x=>x.categorie))].join(", ");
    return `<tr><td>${fmt(day)}</td><td>${c}</td><td>${h}</td></tr>`;
  }).join("")}</tbody></table>`;
}

function renderCat(cat){
  let m=els.mode.value,lim=parseInt(els.limit.value),arr=[];
  for(let p in filtered.byPerson){
    let s=0,d=new Set();
    for(let day in filtered.byPerson[p].details)
      filtered.byPerson[p].details[day].forEach(e=>{if(e.categorie===cat){s++;d.add(day);}});
    if(s>0)arr.push([p,s,d.size]);
  }
  arr.sort((a,b)=>m==="jours"?b[2]-a[2]:b[1]-a[1]);arr=arr.slice(0,lim);
  els.center.innerHTML=`<h2 class="font-semibold mb-2">${cat}</h2>
  <table class="w-full text-xs border rounded"><thead class="bg-slate-100"><tr>
  <th>#</th><th>Personne</th><th class="text-right">${m==="jours"?"Jours":"Créneaux"}</th></tr></thead><tbody>
  ${arr.map((r,i)=>`<tr><td>${i+1}</td><td>${r[0]}</td><td class="text-right">${m==="jours"?r[2]:r[1]}</td></tr>`).join("")}
  </tbody></table>`;
}

let chartCat=null,chartMonth=null;
function updateCharts(){
  let c=filtered.byCat,m=filtered.byMonth;
  let cl=Object.keys(c),cd=Object.values(c),cc=cl.map(x=>colors[x]||"#999");
  if(!chartCat){
    chartCat=new ApexCharts($("#chartCategories"),{chart:{type:"donut",height:"100%",animations:{enabled:true}},
      labels:cl,series:cd,colors:cc,legend:{position:"bottom",fontSize:"10px"},dataLabels:{enabled:false}});
    chartCat.render();
  }else{chartCat.updateOptions({labels:cl,colors:cc});chartCat.updateSeries(cd);}
  let ml=Object.keys(m).sort(),md=ml.map(k=>m[k]);
  if(!chartMonth){
    chartMonth=new ApexCharts($("#chartMonths"),{chart:{type:"bar",height:"100%",animations:{enabled:true}},
      series:[{data:md}],xaxis:{categories:ml,labels:{style:{fontSize:"10px"}}},
      plotOptions:{bar:{borderRadius:4,columnWidth:"55%"}},colors:["#2563eb"],dataLabels:{enabled:false}});
    chartMonth.render();
  }else{chartMonth.updateOptions({xaxis:{categories:ml}});chartMonth.updateSeries([{data:md}]);}
}

els.pg.onclick=()=>{currentPerson=null;currentCategory=null;compute();renderGlobal();updateCharts();highlight();}
els.refresh.onclick=()=>{compute();currentPerson?renderPerson(currentPerson):currentCategory?renderCat(currentCategory):renderGlobal();updateCharts();}
els.clear.onclick=()=>{planning=null;els.center.innerHTML="Données supprimées";};
els.file.onchange=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=x=>{planning=JSON.parse(x.target.result);init();compute();renderGlobal();updateCharts();};r.readAsText(f);};
els.psearch.oninput=renderLists;

autoLoad();
</script>

</body>
</html>
